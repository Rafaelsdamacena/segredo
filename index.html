<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segredo</title>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <h1>{ DES } ENCRIPITADOR</h1>
            </nav>
        </div>
    </header>
    <main>
        <div class="container"> <!--Bordas, margens e centralização do conteúdo-->
            <div class="principal"> <!--Dividir o conteúdo da tela em direita e esquerda-->



                <div class="esquerda"><!--Dividir as classes entrada e saída uma acima da outra respectivamente-->
                    <div class="entrada"><!--Caixa de texto com os botões abaixo, centralizados-->
                        <div class="caixa_texto" ></div>
                            <textarea placeholder="Digite sua mensagem" rows=5 cols=25></textarea>
                        
                        <div class="botoes"><!--alinhar botoes lado a lado no centro-->
                            <button>ENCRIPTAR</button>
                            <button>DESENCRIPTAR</button>


                        </div>
                    </div>

                    <div class="saida">
                        <div class="caixa_texto" ></div>
                            <textarea placeholder="Digite sua mensagem" rows=5 cols=25></textarea>
                            
                        <div class="botao">
                            <button>COPIAR</button>


                        </div>
                    </div>
                </div>

                <div class="direita"> <!--Quadro de instruções em cima e redes sociais em baixo-->

                    <div class="instrucoes"> <!--Conjunto de instrucoes na parte superior-->
                        <h3>
                            Instruções:
                        </h3>

                        <p>Digite um texto qualquer a ser criptografado na caixa de mensagem superior</p>
                        <p>Não digite letras com acentos ou caracteres epeciais</p>
                        <p>Digite apenas letras minúsculas</p>
                        
                        
                        <div class="redes"><!--Redes sociais na parte inferior-->
                        <a href="https://www.linkedin.com/in/rafael-damacena-devops/"><img src="imagens/linkedin.png"></a>
                        <a href="https://github.com/Rafaelsdamacena"><img src="imagens/github.png"></a>

                        </div>
                    </div>
                </div>

            </div>

        </div>


                

    </main>
    <footer>
        <p>Rafael Santos Damacena</p>
        <p>rafael.pandorasbox@gmail.com</p>

    </footer>
</body>
</html>
